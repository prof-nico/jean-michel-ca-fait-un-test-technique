services:
  mysql:
    image: mysql:8
    command: --max_allowed_packet=325058560 --lower_case_table_names=2
    volumes:
      - .docker-dev/.data/mysql:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=test-technique
      - MYSQL_PASSWORD=root
    ports:
      - 3344:3306

  app:
    build: .docker-dev/app
    ports:
      - 8000:8000
    environment:
      - IS_DOCKER=1
    depends_on:
      - mysql
      - rabbitmq
    volumes:
      - .:/var/application
    extra_hosts:
      # Ensure that host.docker.internal is correctly defined on Linux
      - host.docker.internal:host-gateway

  worker:
    build: .docker-dev/app
    command: php bin/console messenger:consume insert_async --time-limit=3600 --env=prod
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    volumes:
      - .:/var/application

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-changeme}
    ports:
      - "5672:5672"   # AMQP
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:7.16.3
    ports:
      - 9201:9200
    environment:
      - discovery.type=single-node
      - http.port=9200
      - ES_JAVA_OPTS=-Xms2g -Xmx8g
